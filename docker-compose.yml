services:
  laravel:
    build: ./cd-server
    ports:
      - "8000:8000"
    volumes:
      - ./cd-server:/app
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY:-base64:your-app-key-here}
    depends_on:
      - db

  vue:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
    environment:
      - NODE_ENV=development

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cubeDrills}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: